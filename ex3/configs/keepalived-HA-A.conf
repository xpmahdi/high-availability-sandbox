global_defs {
    router_id haproxy_node_a
    enable_script_security
    script_user root
}

vrrp_script check_haproxy {
    script "/usr/bin/pgrep haproxy"
    interval 2
    weight 2
}

vrrp_instance VI_HAPROXY {
    state MASTER
    interface eth0
    virtual_router_id 60
    priority 105
    advert_int 1
    virtual_ipaddress {
        172.20.0.100/16
    }
    track_script {
        check_haproxy
    }
}
